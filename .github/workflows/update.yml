name: Surveillance DLS Monitor

on:
  schedule:
    - cron: '*/30 * * * *' # S'exécute automatiquement toutes les 30 minutes
  workflow_dispatch: # Te permet de le lancer manuellement en 1 clic pour tester

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Autorisation indispensable pour mettre à jour le JSON sur ton repo
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: Exécuter le script d'extraction
        run: python update_feed.py

      - name: Sauvegarder et pousser les changements
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add live-feed.json
          # On commit systématiquement pour forcer la mise à jour de l'horodatage du commit
          git commit -m "Mise à jour automatique des alertes cyber [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
          
