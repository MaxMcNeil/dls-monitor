name: Surveillance DLS Monitor

on:
  schedule:
    - cron: '0 */4 * * *' # S'exécute automatiquement toutes les 4 heures (à la minute 0)
  workflow_dispatch: # Permet de le lancer manuellement en 1 clic

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Autorisation obligatoire pour pousser le JSON
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Version stable pour Transformers

      - name: Mettre en cache le modèle de traduction IA
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/huggingface # Dossier de cache global ONNX
          key: ${{ runner.os }}-transformers-nllb-v2

      - name: Installer les dépendances
        run: |
          npm init -y
          npm install node-fetch@2 @xenova/transformers

      - name: Exécuter le script d'extraction et traduction JS
        run: |
          node update_feed.js

      - name: Sauvegarder et pousser les changements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ ! -f "live-feed.json" ]; then
            echo "ERREUR CRITIQUE : live-feed.json n'a pas été généré !"
            exit 1
          fi
          
          git add live-feed.json
          git commit --allow-empty -m "Mise à jour alertes cyber (Traduction ONNX) [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin HEAD:main
          
