<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Command Center - Vertical Live Feed</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050b09;
            color: #00ff9c; font-family: 'Courier New', Courier, monospace;
            width: 1080px; height: 1920px; overflow: hidden;
            border: 4px solid #00ff9c; box-sizing: border-box;
        }
        /* Style War Room */
        .header {
            background-color: #0c1a14; padding: 30px; text-align: center;
            border-bottom: 2px solid #00ff9c; letter-spacing: 4px;
        }
        .header h1 { margin: 0; font-size: 38px; text-shadow: 0 0 10px #00ff9c; }
        
        /* Bannière obligatoire YouTube Policy */
        .policy-ticker {
            background: #ffaa00; color: #000; font-weight: bold; padding: 15px;
            font-size: 20px; text-align: center; text-transform: uppercase;
        }

        .alert-container {
            padding: 40px; height: 1550px; overflow-y: hidden; display: flex; flex-direction: column; gap: 30px;
        }

        /* Design des Popups d'alerte */
        .alert-card {
            background: rgba(12, 26, 20, 0.8); border-left: 8px solid #ff0055;
            padding: 25px; border-radius: 4px; animation: blinkBorder 1.5s infinite alternate;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        }
        .alert-meta { display: flex; justify-content: space-between; font-size: 22px; margin-bottom: 15px; color: #ff0055; font-weight: bold; }
        .alert-target { font-size: 32px; color: #ffffff; margin-bottom: 10px; font-weight: bold;}
        .alert-details { font-size: 22px; color: #a3b8b0; line-height: 1.4; }

        @keyframes blinkBorder {
            from { border-left-color: #ff0055; }
            to { border-left-color: #050b09; }
        }
    </style>
</head>
<body>

    <div class="policy-ticker">
        INFO-VEILLE COMPATIBLE : SENSIBILISATION NEUTRE AUX MENACES INFORMATIQUES GLOBALES
    </div>
    
    <div class="header">
        <h1>[ CYBER INTELLIGENCE COMMAND CENTER ]</h1>
        <div style="font-size: 20px; margin-top: 10px; color:#a3b8b0;">STABILIZED LIVE FEED // FEED: REFRESH AUTOMATIC</div>
    </div>

    <div class="alert-container" id="feed">
        <!-- Les cartes d'alertes s'injecteront ici automatiquement -->
    </div>

    <!-- Son d'alerte éternel lors de l'apparition d'un nouveau log -->
    <audio id="beep-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script>
        let lastTimestamp = "";
        const audio = document.getElementById('beep-sound');

        async function updateDashboard() {
            try {
                // Charge le fichier généré par ta GitHub Action
                const res = await fetch('./live-feed.json?t=' + f = new Date().getTime());
                const data = await res.json();
                
                if(data.length > 0 && data[0].time !== lastTimestamp) {
                    lastTimestamp = data[0].time;
                    // Joue le bip d'alerte
                    audio.play().catch(e => console.log("Audio en attente d'interaction"));
                    
                    // Rendu des popups
                    const container = document.getElementById('feed');
                    container.innerHTML = "";
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'alert-card';
                        card.innerHTML = `
                            <div class="alert-meta">
                                <span>ACTEUR: ${item.hacker}</span>
                                <span>${item.time.split('.')[0]}</span>
                            </div>
                            <div class="alert-target">CIBLE EXFILTRÉE : ${item.target}</div>
                            <div class="alert-details">${item.details}</div>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (e) { console.error("Erreur de mise à jour du flux", e); }
        }

        // Boucle d'auto-rafraîchissement toutes les 30 secondes pour le navigateur OBS
        setInterval(updateDashboard, 30000);
        updateDashboard();
    </script>
</body>
      </html>
