<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Command Center - Dynamic Vertical Live Matrix</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0; background-color: #020504; 
            color: #00ff9c; font-family: 'Courier New', Courier, monospace;
            width: 1080px; height: 1920px; overflow: hidden;
            border: 8px solid #00ff9c;
            position: relative;
        }
        
        /* Bannière de Neutralité Permanente Obligatoire - Contraste Maximal */
        .policy-ticker {
            background: #ffaa00; color: #000000; font-weight: 900; padding: 20px;
            font-size: 22px; text-align: center; text-transform: uppercase;
            border-bottom: 4px solid #00ff9c; letter-spacing: 1px;
            line-height: 1.3;
        }

        /* En-tête War Room */
        .header {
            background-color: #060f0b; padding: 35px 20px; text-align: center;
            border-bottom: 4px solid #00ff9c; letter-spacing: 4px;
        }
        .header h1 { margin: 0; font-size: 40px; text-shadow: 0 0 15px #00ff9c; font-weight: 900; }
        
        /* Animation éternelle des 3 points de chargement */
        .dot-loading::after {
            content: ' .';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ' .'; }
            40% { content: ' . .'; }
            60% { content: ' . . .'; }
            80%, 100% { content: ''; }
        }

        /* Zone de défilement ventilée remontée pour laisser apparaître le bas */
        .alert-container {
            padding: 40px; height: 1250px; overflow: hidden; display: block;
            position: relative;
        }

        /* Cartes d'incident - Optimisées pour l'accessibilité des malvoyants */
        .alert-card {
            background: #091410; 
            border: 3px solid #00ff9c; 
            border-left: 14px solid #ff0055; 
            padding: 30px; margin-bottom: 30px; border-radius: 6px; 
            transition: transform 0.5s ease-in-out, border-color 0.5s;
            box-shadow: 0 0 25px rgba(0, 255, 156, 0.1);
        }
        
        /* Effet Zoom/Dézoom et alerte visuelle continue sur le rectangle du haut */
        .top-card-zoom {
            border-color: #ff0055 !important;
            box-shadow: 0 0 45px rgba(255, 0, 85, 0.4);
            animation: topPulse 2s infinite ease-in-out;
        }

        @keyframes topPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        .alert-meta { 
            display: table; width: 100%; font-size: 24px; margin-bottom: 15px; 
            color: #ff0055; font-weight: bold; letter-spacing: 2px;
        }
        .meta-hacker { display: table-cell; text-align: left; }
        .meta-time { display: table-cell; text-align: right; color: #ffaa00; }
        
        .alert-target { 
            font-size: 36px; color: #ffffff; margin-bottom: 15px; 
            font-weight: bold; text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }
        .alert-details { 
            font-size: 24px; color: #ffffff; line-height: 1.6; 
            background: #000000; padding: 18px; border-radius: 4px;
            border: 2px solid #142820;
        }

        /* ZONE DU POPUP FLASH RADAR (CADRE DE ROTATION INFINIE) */
        .radar-popup-zone {
            height: 300px; padding: 0 40px; display: flex; align-items: center; justify-content: center;
            background: #060f0b; border-top: 4px solid #00ff9c; position: relative;
        }

        .radar-card {
            background: #1a000a; border: 4px solid #ff0055; padding: 20px; width: 100%;
            border-radius: 8px; text-align: center;
            animation: zoomInOut 2s infinite ease-in-out;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.5);
        }
        .radar-title { font-size: 26px; color: #ff0055; font-weight: bold; margin-bottom: 5px; letter-spacing: 3px; }
        .radar-body { font-size: 34px; color: #ffffff; font-weight: bold; }

        @keyframes zoomInOut {
            0% { transform: scale(0.96); box-shadow: 0 0 20px rgba(255, 0, 85, 0.3); }
            50% { transform: scale(1.04); box-shadow: 0 0 50px rgba(255, 0, 85, 0.7); }
            100% { transform: scale(0.96); box-shadow: 0 0 20px rgba(255, 0, 85, 0.3); }
        }

        /* CORRECTION ET DESIGN ARTISTIQUE DE L'OVERLAY POPUP (LISIBILITÉ MAXIMALE MALVOYANTS) */
        .mega-flash-overlay {
            position: absolute; top: 0; left: 0; width: 1080px; height: 1920px;
            background: rgba(20, 1, 3, 0.98); z-index: 9999;
            display: none; padding: 60px;
            border: 24px solid #ff0055;
            animation: flashIntro 0.2s ease-out;
        }
        
        /* Conteneur interne pour forcer un centrage vertical parfait sans distorsion */
        .flash-vertical-center {
            display: table; width: 100%; height: 100%;
        }
        
        .flash-cell {
            display: table-cell; vertical-align: middle; text-align: center;
        }
        
        @keyframes flashIntro {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 1; transform: scale(1); }
        }

        .flash-header {
            color: #ff0055; font-size: 60px; font-weight: 900;
            margin-bottom: 60px; letter-spacing: 4px; text-shadow: 0 0 35px #ff0055;
            line-height: 1.2; text-transform: uppercase;
        }
        
        .flash-card {
            background: #000000; border: 8px solid #ff0055;
            padding: 60px 40px; border-radius: 16px; text-align: left;
            box-shadow: 0 0 60px rgba(255, 0, 85, 0.5);
            width: 100%; display: block;
        }
        
        .flash-meta { 
            font-size: 34px; color: #ffaa00; font-weight: 900; 
            margin-bottom: 35px; letter-spacing: 2px; border-bottom: 2px dashed #ff0055;
            padding-bottom: 15px;
        }
        
        .flash-target { 
            font-size: 58px; color: #ffffff; font-weight: 900; 
            line-height: 1.3; text-shadow: 0 0 15px rgba(255,255,255,0.4);
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="mega-flash-overlay" id="mega-flash">
        <div class="flash-vertical-center">
            <div class="flash-cell">
                <div class="flash-header" id="flash-title">🚨 CRITICAL ALERT 🚨</div>
                <div id="flash-content"></div>
            </div>
        </div>
    </div>

    <div class="policy-ticker">
        Avertissement : Ce flux contribue exclusivement au débat public et à la sensibilisation neutre face aux cybermenaces. Nous ne soutenons ni ne validons aucune entité mentionnée.
    </div>
    
    <div class="header">
        <h1 class="dot-loading">[ LIVE : DEMANDES DE RANÇON ]</h1>
    </div>

    <div class="alert-container" id="feed"></div>

    <div class="radar-popup-zone">
        <div class="radar-card" id="radar-popup">
            <div class="radar-title">🚨 RADAR FOCUS ACTIVE</div>
            <div class="radar-body" id="radar-target">ATTENTE DE DONNÉES...</div>
        </div>
    </div>

    <script>
        let allAlerts = [];
        let currentIndex = 0;
        let flashIndex = 0; // Index séquentiel perpétuel pour le Top 3
        
        const container = document.getElementById('feed');
        const radarTarget = document.getElementById('radar-target');

        // Générateur audio natif (Web Audio API) pour contourner définitivement les blocages de bips sur OBS
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBeepSound(frequency, duration, volume) {
            try {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                // Effet d'atténuation progressive du bip
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log("Audio bloqué par le navigateur");
            }
        }

        async function fetchNewData() {
            try {
                const res = await fetch('./live-feed.json?t=' + new Date().getTime());
                const data = await res.json();
                if (data && data.length > 0) {
                    allAlerts = data;
                }
            } catch (e) {
                console.error("Erreur de synchronisation", e);
            }
        }

        function rotateAlerts() {
            if (allAlerts.length === 0) return;

            container.innerHTML = "";
            let itemsToShow = Math.min(4, allAlerts.length);
            
            for (let i = 0; i < itemsToShow; i++) {
                let index = (currentIndex + i) % allAlerts.length;
                let item = allAlerts[index];
                
                const card = document.createElement('div');
                // La carte du haut (i === 0) receives the animation class
                card.className = (i === 0) ? 'alert-card top-card-zoom' : 'alert-card';
                
                let displayTime = item.time ? item.time.split('.')[0] : "REAL-TIME";
                
                card.innerHTML = `
                    <div class="alert-meta">
                        <div class="meta-hacker">▲ ACTEUR: ${item.hacker}</div>
                        <div class="meta-time">${displayTime}</div>
                    </div>
                    <div class="alert-target">CIBLE DÉTECTÉE : ${item.target}</div>
                    <div class="alert-details">${item.details}</div>
                `;
                container.appendChild(card);
            }

            let currentRadarItem = allAlerts[currentIndex];
            radarTarget.innerText = currentRadarItem.target;
            
            // BIP 1 : Déclenchement d'un bip propre haute fréquence à chaque rotation du rectangle du haut
            playBeepSound(880, 0.15, 0.12);

            currentIndex = (currentIndex + 1) % allAlerts.length;
        }

        // POPUP SEQUENTIEL AMÉLIORÉ : Rendu ultra-large, aéré et contrasté au centre exact de l'écran
        function triggerMegaFlashPopup() {
            if (allAlerts.length === 0) return;
            
            const flashOverlay = document.getElementById('mega-flash');
            const flashContent = document.getElementById('flash-content');
            const flashTitle = document.getElementById('flash-title');
            
            flashContent.innerHTML = "";
            
            let rank = (flashIndex % 3); 
            let item = allAlerts[rank];
            
            if (!item) item = allAlerts[0]; 
            
            flashTitle.innerText = `🚨 CRITICAL ALERT RANK #${rank + 1} 🚨`;
            
            const fCard = document.createElement('div');
            fCard.className = 'flash-card';
            // Application d'un style de détails massif (font-size: 38px) et aéré pour l'accessibilité
            fCard.innerHTML = `
                <div class="flash-meta">ACTEUR: ${item.hacker} // DETECTED: ${item.time.split('.')[0]}</div>
                <div class="flash-target">TARGET: ${item.target}</div>
                <div class="alert-details" style="margin-top:20px; font-size:38px; line-height:1.6; padding:35px; background-color:#020504; border:3px solid #ff0055;">${item.details}</div>
            `;
            flashContent.appendChild(fCard);
            
            flashOverlay.style.display = 'block';
            
            // BIP 2 : Double bip strident de crise pour le popup d'alerte prioritaire
            playBeepSound(440, 0.4, 0.35);
            setTimeout(() => playBeepSound(440, 0.4, 0.35), 200);
            
            setTimeout(() => {
                flashOverlay.style.display = 'none';
            }, 5000);

            flashIndex++;
        }

        async function init() {
            await fetchNewData();
            rotateAlerts();
            
            // Cycle infini du carrousel d'arrière-plan (Toutes les 8 secondes)
            setInterval(rotateAlerts, 8000);
            
            // Cycle séquentiel du Méga Flash Popup (Toutes les 60 secondes)
            setInterval(triggerMegaFlashPopup, 60000);
            
            // Synchronisation du fichier source (Toutes les 30 secondes)
            setInterval(fetchNewData, 30000);
        }

        window.onload = init;
    </script>
</body>
</html>
